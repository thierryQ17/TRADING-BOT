# Configuration nginx pour trading.youpiare.fr
# A copier dans /etc/nginx/sites-available/ sur le VPS
# puis: ln -s /etc/nginx/sites-available/trading.conf /etc/nginx/sites-enabled/
# puis: sudo nginx -t && sudo systemctl reload nginx

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name trading.youpiare.fr;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name trading.youpiare.fr;

    # SSL (Let's Encrypt — generer avec:)
    # sudo certbot --nginx -d trading.youpiare.fr
    ssl_certificate /etc/letsencrypt/live/trading.youpiare.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trading.youpiare.fr/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8818;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (pour futur usage)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
